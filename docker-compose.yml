version: "3.8"

services:
  frontend:
    build:
      context: .
      target: development
    container_name: klynn-frontend-local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    env_file:
      - .env
