services:
  landing:
    build:
      context: .
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.getklynn.com}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Klynn}
        NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-1.0.0}
    container_name: klynn-landing-prod
    restart: unless-stopped
    env_file:
      - .env.production
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"

      # Router HTTP -> HTTPS Redirect
      - "traefik.http.routers.klynn-landing-prod-http.rule=Host(`getklynn.com`)"
      - "traefik.http.routers.klynn-landing-prod-http.entrypoints=web"
      - "traefik.http.routers.klynn-landing-prod-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

      # Router HTTPS (Con headers de seguridad y compresión)
      - "traefik.http.routers.klynn-landing-prod.rule=Host(`getklynn.com`)"
      - "traefik.http.routers.klynn-landing-prod.entrypoints=websecure"
      - "traefik.http.routers.klynn-landing-prod.tls.certresolver=letsencrypt"
      - "traefik.http.routers.klynn-landing-prod.middlewares=landing-prod-headers,landing-prod-compress"

      # Service definition
      - "traefik.http.routers.klynn-landing-prod.service=klynn-landing-prod"
      - "traefik.http.services.klynn-landing-prod.loadbalancer.server.port=3000"

networks:
  dokploy-network:
    external: true

