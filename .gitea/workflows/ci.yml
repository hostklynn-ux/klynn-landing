name: "CI - Build & Test"

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

env:
  GITEA_URL: https://git.getklynn.com
  REPO: Klynn/Landing

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.getklynn.com/api/v1
          NEXT_PUBLIC_APP_NAME: Klynn
          NEXT_PUBLIC_APP_VERSION: 1.0.0
        run: bun run build

      - name: Build Summary
        run: |
          echo "✅ Build completed successfully"
          echo "📦 Build info:"
          ls -lh .next/standalone || echo "Standalone build not found"
